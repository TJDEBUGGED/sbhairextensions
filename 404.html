    <style>
        :root{--gold:#C9A84C;--off-white:#FAFAF5;--text-dark:#2C2C2C;--text-medium:#5A5A5A;--text-light:#8A8A8A;--border-light:#E8E0D0}

        .logo{margin-bottom:48px}
        .logo svg{width:70px;height:70px}
        .code{font-family:'Playfair Display',serif;font-size:clamp(80px,15vw,160px);font-weight:500;color:var(--border-light);line-height:1;margin-bottom:8px}

        a.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
        .divider{width:60px;height:1px;background:var(--gold);margin:0 auto 40px;opacity:.4}
    </style>
</head>
